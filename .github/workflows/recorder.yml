name: Twitch Audio Recorder
on:
  schedule:
    - cron: '*/10 * * * *' # Проверка каждые 10 минут
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Install Streamlink
        run: |
          sudo apt-get update
          sudo apt-get install -y streamlink

      - name: Record Audio Only
        run: |
          # Замените ВАШ_КАНАЛ на ник стримера (например, twitch.tv/gaules)
          # Записываем только звук (audio_only), чтобы файл был легким
          # --max-run-time 10s — лимит работы GitHub (6 часов)
          streamlink twitch.tv/sanhez audio_only -o stream_audio.mp4 --twitch-disable-ads --retry-streams 30

      - name: Upload Audio
        uses: actions/upload-artifact@v4
        with:
          name: twitch-audio-${{ github.run_id }}
          path: stream_audio.mp4
          retention-days: 3 # Файл удалится через 3 дня (экономим место)
