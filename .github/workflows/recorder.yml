name: Twitch Audio Recorder

on:
  schedule:
    - cron: '*/10 * * * *' # Проверка каждые 10 минут
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Install Streamlink
        run: |
          sudo apt-get update
          sudo apt-get install -y streamlink

      - name: Record Audio Only
        run: |
          # Используем системный timeout для ограничения записи в 10 секунд
          # --twitch-disable-ads пропустит рекламу
          # --retry-streams 30 будет пытаться подключиться, если стрим еще не начался
          timeout 10s streamlink twitch.tv/sanhez audio_only -o stream_audio.mp4 --twitch-disable-ads --retry-streams 30 || true

      - name: Upload Audio
        uses: actions/upload-artifact@v4
        with:
          # Добавляем ID запуска в имя, чтобы файлы не перезаписывались
          name: twitch-audio-${{ github.run_id }}
          path: stream_audio.mp4
          retention-days: 3
